name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        ruby:
          - "3.3"
          - "3.4"
          - "4.0"

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev imagemagick jpegoptim libjpeg-turbo-progs pngquant optipng
          # cjpegli is optional; its tests skip when it is missing.
          sudo apt-get install -y libjxl-tools || true
          command -v convert identify jpegoptim jpegtran optipng pngquant

      - name: Setup ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Lint
        run: bundle exec rubocop

      - name: Tests
        run: bundle exec rake test

  arm64:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev imagemagick jpegoptim libjpeg-turbo-progs pngquant optipng
          # cjpegli is optional; its tests skip when it is missing.
          sudo apt-get install -y libjxl-tools || true
          command -v convert identify jpegoptim jpegtran optipng pngquant

      - name: Setup ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Tests
        run: bundle exec rake test

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - build
      - arm64
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Release Gem
        uses: discourse/publish-rubygems-action@v3
        env:
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
          GIT_EMAIL: team@discourse.org
          GIT_NAME: discoursebot
